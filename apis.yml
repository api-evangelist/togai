aid: togai
name: Togai
description: Togai is a metering and billing platform for software and SaaS products, purpose-built for consumption-based
  and usage-based pricing models. The Togai API provides programmatic access to customers, accounts, event ingestion, usage
  meters, price plans, invoices, credits, entitlements, and financial reporting. Supports real-time billing orchestration
  across cloud infrastructure, generative AI services, and SaaS applications.
