    description: >-
      The Togai API provides full programmatic access to the Togai usage-based billing platform. Resources include
      customers, accounts, event schemas, usage meters, price plans, pricing rules, invoices, credits, entitlements,
      wallet, licenses, and reports. Supports both production and sandbox environments.
