naftiko: "1.0.0-alpha1"

info:
  label: "Togai API"
  description: "Togai usage-based billing platform API providing access to customers, accounts, events, usage meters, price plans, invoices, credits, and entitlements."
  tags:
    - Togai
    - Billing
    - Metering
    - Usage-Based Pricing
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TOGAI_API_TOKEN: TOGAI_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: togai
      baseUri: https://api.togai.com
      description: "Togai usage-based billing API"
      authentication:
        type: bearer
        token: "{{TOGAI_API_TOKEN}}"
      resources:
        - name: customers
          path: /customers
          description: "Customer lifecycle management"
          operations:
            - name: list-customers
              method: GET
              description: "List all customers"
              inputParameters:
                - name: nextToken
                  in: query
                  type: string
                  required: false
                  description: "Pagination token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-customer
              method: POST
              description: "Create a new customer"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  id: "{{tools.id}}"
                  primaryEmail: "{{tools.primaryEmail}}"
            - name: get-customer
              method: GET
              description: "Get a customer by ID"
              inputParameters:
                - name: customerId
                  in: path
                  type: string
                  required: true
                  description: "Customer ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: accounts
          path: /customers/{customerId}/accounts
          description: "Account management"
          operations:
            - name: list-accounts
              method: GET
              description: "List accounts for a customer"
              inputParameters:
                - name: customerId
                  in: path
                  type: string
                  required: true
                  description: "Customer ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-account
              method: POST
              description: "Create a new account"
              inputParameters:
                - name: customerId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  name: "{{tools.name}}"
        - name: events
          path: /ingest
          description: "Event ingestion"
          operations:
            - name: ingest-events
              method: POST
              description: "Ingest usage events"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  events: "{{tools.events}}"
        - name: usage-meters
          path: /event-schema/{eventSchemaName}/usage-meters
          description: "Usage meter management"
          operations:
            - name: list-usage-meters
              method: GET
              description: "List usage meters for an event schema"
              inputParameters:
                - name: eventSchemaName
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: price-plans
          path: /price-plans
          description: "Price plan management"
          operations:
            - name: list-price-plans
              method: GET
              description: "List all price plans"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-price-plan
              method: POST
              description: "Create a new price plan"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"
        - name: invoices
          path: /accounts/{accountId}/invoices
          description: "Invoice management"
          operations:
            - name: list-invoices
              method: GET
              description: "List invoices for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: credits
          path: /accounts/{accountId}/credits
          description: "Credit management"
          operations:
            - name: list-credits
              method: GET
              description: "List credits for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: grant-credit
              method: POST
              description: "Grant credit to an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  effectiveFrom: "{{tools.effectiveFrom}}"
                  effectiveTo: "{{tools.effectiveTo}}"
                  creditAmount: "{{tools.creditAmount}}"

  exposes:
    - type: rest
      port: 8100
      namespace: togai-rest
      resources:
        - path: /v1/customers
          name: customers
          description: "Customer management"
          operations:
            - method: GET
              name: list-customers
              description: "List customers"
              call: "togai.list-customers"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-customer
              description: "Create customer"
              call: "togai.create-customer"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/price-plans
          name: price-plans
          description: "Price plan management"
          operations:
            - method: GET
              name: list-price-plans
              description: "List price plans"
              call: "togai.list-price-plans"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: togai-mcp
      transport: http
      tools:
        - name: list-customers
          description: "List Togai customers"
          hints:
            readOnly: true
            openWorld: false
          call: "togai.list-customers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-customer
          description: "Create a new Togai customer"
          hints:
            readOnly: false
            destructive: false
          call: "togai.create-customer"
          outputParameters:
            - type: object
              mapping: "$."
        - name: ingest-events
          description: "Ingest usage events into Togai"
          hints:
            readOnly: false
            destructive: false
          call: "togai.ingest-events"
          outputParameters:
            - type: object
              mapping: "$."
