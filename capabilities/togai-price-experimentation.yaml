naftiko: 1.0.0-alpha2
info:
  label: Togai Apis — Price Experimentation
  description: 'Togai Apis — Price Experimentation. 1 operations. Lead operation: Calculate and Return the Revenue for a Existing
    or New Price Plan. Self-contained Naftiko capability covering one Togai business surface.'
  tags:
  - Togai
  - Price Experimentation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGAI_API_KEY: TOGAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: togai-price-experimentation
    baseUri: https://api.togai.com
    description: Togai Apis — Price Experimentation business capability. Self-contained, no shared references.
    resources:
    - name: revenue_calculator
      path: /revenue_calculator
      operations:
      - name: calculaterevenue
        method: POST
        description: Calculate and Return the Revenue for a Existing or New Price Plan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.TOGAI_API_KEY}}'
  exposes:
  - type: rest
    namespace: togai-price-experimentation-rest
    port: 8080
    description: REST adapter for Togai Apis — Price Experimentation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/revenue-calculator
      name: revenue-calculator
      description: REST surface for revenue_calculator.
      operations:
      - method: POST
        name: calculaterevenue
        description: Calculate and Return the Revenue for a Existing or New Price Plan
        call: togai-price-experimentation.calculaterevenue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: togai-price-experimentation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Togai Apis — Price Experimentation. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: calculate-and-return-revenue-existing
      description: Calculate and Return the Revenue for a Existing or New Price Plan
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: togai-price-experimentation.calculaterevenue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
