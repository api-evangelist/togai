naftiko: 1.0.0-alpha2
info:
  label: Togai Apis — Feature
  description: 'Togai Apis — Feature. 4 operations. Lead operation: Create a Feature and Optionally Associate with One or
    More Event_schemas. Self-contained Naftiko capability covering one Togai business surface.'
  tags:
  - Togai
  - Feature
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGAI_API_KEY: TOGAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: togai-feature
    baseUri: https://api.togai.com
    description: Togai Apis — Feature business capability. Self-contained, no shared references.
    resources:
    - name: features
      path: /features
      operations:
      - name: createfeature
        method: POST
        description: Create a Feature and Optionally Associate with One or More Event_schemas
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getfeatures
        method: GET
        description: List Feature
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: features-feature_id
      path: /features/{feature_id}
      operations:
      - name: updatefeature
        method: PATCH
        description: Update a Feature
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getfeature
        method: GET
        description: Get a Feature
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOGAI_API_KEY}}'
  exposes:
  - type: rest
    namespace: togai-feature-rest
    port: 8080
    description: REST adapter for Togai Apis — Feature. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/features
      name: features
      description: REST surface for features.
      operations:
      - method: POST
        name: createfeature
        description: Create a Feature and Optionally Associate with One or More Event_schemas
        call: togai-feature.createfeature
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getfeatures
        description: List Feature
        call: togai-feature.getfeatures
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/features/{feature-id}
      name: features-feature-id
      description: REST surface for features-feature_id.
      operations:
      - method: PATCH
        name: updatefeature
        description: Update a Feature
        call: togai-feature.updatefeature
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getfeature
        description: Get a Feature
        call: togai-feature.getfeature
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: togai-feature-mcp
    port: 9090
    transport: http
    description: MCP adapter for Togai Apis — Feature. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-feature-and-optionally-associate
      description: Create a Feature and Optionally Associate with One or More Event_schemas
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: togai-feature.createfeature
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-feature
      description: List Feature
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: togai-feature.getfeatures
      outputParameters:
      - type: object
        mapping: $.
    - name: update-feature
      description: Update a Feature
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: togai-feature.updatefeature
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-feature
      description: Get a Feature
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: togai-feature.getfeature
      outputParameters:
      - type: object
        mapping: $.
