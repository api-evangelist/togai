naftiko: 1.0.0-alpha2
info:
  label: Togai Apis — Event Ingestion
  description: 'Togai Apis — Event Ingestion. 2 operations. Lead operation: Ingest Events to Togai. Self-contained Naftiko
    capability covering one Togai business surface.'
  tags:
  - Togai
  - Event Ingestion
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGAI_API_KEY: TOGAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: togai-event-ingestion
    baseUri: https://api.togai.com
    description: Togai Apis — Event Ingestion business capability. Self-contained, no shared references.
    resources:
    - name: ingest
      path: /ingest
      operations:
      - name: ingest
        method: POST
        description: Ingest Events to Togai
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: ingestBatch
      path: /ingestBatch
      operations:
      - name: ingestbatch
        method: POST
        description: Ingest Events to Togai in Batch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TOGAI_API_KEY}}'
  exposes:
  - type: rest
    namespace: togai-event-ingestion-rest
    port: 8080
    description: REST adapter for Togai Apis — Event Ingestion. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/ingest
      name: ingest
      description: REST surface for ingest.
      operations:
      - method: POST
        name: ingest
        description: Ingest Events to Togai
        call: togai-event-ingestion.ingest
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ingestbatch
      name: ingestbatch
      description: REST surface for ingestBatch.
      operations:
      - method: POST
        name: ingestbatch
        description: Ingest Events to Togai in Batch
        call: togai-event-ingestion.ingestbatch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: togai-event-ingestion-mcp
    port: 9090
    transport: http
    description: MCP adapter for Togai Apis — Event Ingestion. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: ingest-events-togai
      description: Ingest Events to Togai
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: togai-event-ingestion.ingest
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ingest-events-togai-batch
      description: Ingest Events to Togai in Batch
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: togai-event-ingestion.ingestbatch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
