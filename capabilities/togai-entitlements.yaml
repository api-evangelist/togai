      operations:
      - name: ingestentitledevent
        method: POST
        description: Ingest Event if a User is Entitled to a Feature
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
