      type: bearer
      token: '{{env.TOGAI_API_KEY}}'
  exposes:
  - type: rest
    namespace: togai-entitlements-rest
    port: 8080
    description: REST adapter for Togai Apis — Entitlements. One Spectral-compliant resource per consumed operation, prefixed
