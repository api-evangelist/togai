      call: togai-jobs.getjobstatus
      outputParameters:
      - type: object
        mapping: $.
    - name: confirm-job
      description: Confirm a Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: togai-jobs.confirmjob
      outputParameters:
      - type: object
        mapping: $.
    - name: list-job-entries
      description: List Job Entries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: togai-jobs.getjobentries
      outputParameters:
      - type: object
        mapping: $.
    - name: reject-job
