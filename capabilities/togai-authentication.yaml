naftiko: 1.0.0-alpha2
info:
  label: Togai Apis — Authentication
  description: 'Togai Apis — Authentication. 1 operations. Lead operation: Generate Short Lived Bearer Token. Self-contained
    Naftiko capability covering one Togai business surface.'
  tags:
  - Togai
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOGAI_API_KEY: TOGAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: togai-authentication
    baseUri: https://api.togai.com
    description: Togai Apis — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: authenticate
      path: /authenticate
      operations:
      - name: authenticate
        method: POST
        description: Generate Short Lived Bearer Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TOGAI_API_KEY}}'
  exposes:
  - type: rest
    namespace: togai-authentication-rest
    port: 8080
    description: REST adapter for Togai Apis — Authentication. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/authenticate
      name: authenticate
      description: REST surface for authenticate.
      operations:
      - method: POST
        name: authenticate
        description: Generate Short Lived Bearer Token
        call: togai-authentication.authenticate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: togai-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Togai Apis — Authentication. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: generate-short-lived-bearer-token
      description: Generate Short Lived Bearer Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: togai-authentication.authenticate
      outputParameters:
      - type: object
        mapping: $.
