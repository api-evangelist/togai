      description: REST surface for aliases.
      operations:
      - method: GET
        name: listaliases
        description: List All Aliases
        call: togai-aliases.listaliases
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createalias
        description: Create an Alias
        call: togai-aliases.createalias
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/aliases/{alias}
      name: aliases-alias
